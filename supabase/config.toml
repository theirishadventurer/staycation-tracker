# Supabase local development config
# https://supabase.com/docs/reference/cli/config

project_id = "staycation-tracker"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true   # Allows anonymous-only flow for solo use

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false       # Skip email confirmation for fast solo dev

[auth.email.template.invite]
subject = "You're invited to Staycation Tracker"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
